<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Suraj Analytics</title>
  <meta name="description" content="Contact Suraj Analytics to discuss an ROI blueprint or intelligent workflow opportunity." />
  <link rel="canonical" href="https://www.surajanalytics.com/contact.html" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.surajanalytics.com/contact.html" />
  <meta property="og:site_name" content="Suraj Analytics" />
  <meta property="og:title" content="Contact — Suraj Analytics" />
  <meta property="og:description" content="Contact Suraj Analytics to discuss an ROI blueprint or intelligent workflow opportunity." />
  <meta property="og:image" content="https://www.surajanalytics.com/assets/logo-dark.png" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@_jazoo" />
  <meta name="twitter:title" content="Contact — Suraj Analytics" />
  <meta name="twitter:description" content="Contact Suraj Analytics to discuss an ROI blueprint or intelligent workflow opportunity." />
  <meta name="twitter:image" content="https://www.surajanalytics.com/assets/logo-dark.png" />

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "@id": "https://www.surajanalytics.com/contact.html#webpage",
    "url": "https://www.surajanalytics.com/contact.html",
    "name": "Contact — Suraj Analytics",
    "description": "Contact Suraj Analytics to discuss an ROI blueprint or intelligent workflow opportunity.",
    "isPartOf": { "@id": "https://www.surajanalytics.com/#website" },
    "about": { "@id": "https://www.surajanalytics.com/#org" }
  }
  </script>

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <meta name="color-scheme" content="light dark" />
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="nav" data-component="site-header"></header>

    <main>
      <section class="contact-layout">
        <div class="page-hero page-hero--contact">
          <p class="eyebrow">
            <img class="icon-sm" src="assets/icons/24_mail.svg" alt="" />
            Contact
          </p>
          <h1>Let’s find the workflow worth fixing first.</h1>
          <p>
            Tell us where operations feel slow, manual, or unclear. We will
            start by looking for the practical business case before recommending
            a system.
          </p>
          <div class="contact-methods">
            <a href="mailto:info@surajanalytics.com">info@surajanalytics.com</a>
            <a href="https://calendar.notion.so/meet/sumit-ntn/dheesystems" aria-label="Booking link placeholder">Booking link coming soon</a>
          </div>
        </div>

        <form class="contact-form" id="contact-form" novalidate>
          <p
            class="contact-form__status field-full"
            id="contact-form-status"
            role="status"
            aria-live="polite"
            hidden
          ></p>
          <label class="contact-form__honeypot" aria-hidden="true">
            Leave blank
            <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" />
          </label>
          <label>
            First name
            <input type="text" name="first-name" placeholder="Your first name" required />
          </label>
          <label>
            Last name
            <input type="text" name="last-name" placeholder="Your last name" required />
          </label>
          <label>
            Work email
            <input type="email" name="email" placeholder="you@company.com" required />
          </label>
          <label>
            Company
            <input type="text" name="company" placeholder="Company name" />
          </label>
          <label class="field-full">
            What should improve?
            <textarea
              name="message"
              rows="5"
              placeholder="Share the workflow, bottleneck, or opportunity you want to explore."
              required
            ></textarea>
          </label>
          <button class="btn btn--primary field-full" type="submit">
            <span class="btn__label">Send inquiry</span>
            <span class="nav__arrow" aria-hidden="true">&#8599;</span>
          </button>
        </form>
      </section>
    </main>

    <footer class="site-footer" data-component="site-footer"></footer>
  </div>

  <script src="site-menu.js"></script>
  <script src="theme.js"></script>
  <script src="header.js"></script>
  <script src="nav.js"></script>
  <script src="footer.js"></script>
  <script src="contact-form.js"></script>
</body>
</html>
