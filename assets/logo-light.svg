<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img">
  <title>Arka</title>

  <!-- Sun ray mark — amber, centered at 40,40 -->
  <g transform="translate(12, 8)" fill="none">
    <!-- center dot -->
    <circle cx="28" cy="28" r="4.8" fill="#c97a0a"/>
    <!-- cardinal rays -->
    <line x1="28" y1="22.5" x2="28" y2="6"  stroke="#c97a0a" stroke-width="3.3" stroke-linecap="round"/>
    <line x1="33.5" y1="22.5" x2="44" y2="11" stroke="#c97a0a" stroke-width="2.7" stroke-linecap="round" opacity=".85"/>
    <line x1="33.5" y1="28" x2="50" y2="28"  stroke="#c97a0a" stroke-width="3.3" stroke-linecap="round"/>
    <line x1="33.5" y1="33.5" x2="44" y2="44" stroke="#c97a0a" stroke-width="2.7" stroke-linecap="round" opacity=".85"/>
    <line x1="28" y1="33.5" x2="28" y2="50"  stroke="#c97a0a" stroke-width="3.3" stroke-linecap="round"/>
    <line x1="22.5" y1="33.5" x2="12" y2="44" stroke="#c97a0a" stroke-width="2.7" stroke-linecap="round" opacity=".85"/>
    <line x1="22.5" y1="28" x2="6" y2="28"   stroke="#c97a0a" stroke-width="3.3" stroke-linecap="round"/>
    <line x1="22.5" y1="22.5" x2="12" y2="11" stroke="#c97a0a" stroke-width="2.7" stroke-linecap="round" opacity=".85"/>
  </g>

  <!-- Wordmark -->
  <text
    x="80" y="46"
    font-family="'Bricolage Grotesque', 'Helvetica Neue', Arial, sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="-1"
    fill="#1e3a5f"
  >Arka</text>

</svg>
