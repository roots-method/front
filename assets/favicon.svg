<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Arka">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#0d1b35"/>
  <!-- Sun mark — scaled from 36×36 nav mark to 64×64, centered -->
  <g transform="translate(32,32)" fill="none" stroke="#e8a030" stroke-linecap="round">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5.7" fill="#e8a030" stroke="none"/>
    <!-- Cardinal rays -->
    <line x1="0" y1="-8.5" x2="0" y2="-24" stroke-width="3.9"/>
    <line x1="8.5" y1="0" x2="24" y2="0" stroke-width="3.9"/>
    <line x1="0" y1="8.5" x2="0" y2="24" stroke-width="3.9"/>
    <line x1="-8.5" y1="0" x2="-24" y2="0" stroke-width="3.9"/>
    <!-- Diagonal rays -->
    <line x1="6" y1="-6" x2="17" y2="-17" stroke-width="3.2" opacity=".85"/>
    <line x1="6" y1="6" x2="17" y2="17" stroke-width="3.2" opacity=".85"/>
    <line x1="-6" y1="6" x2="-17" y2="17" stroke-width="3.2" opacity=".85"/>
    <line x1="-6" y1="-6" x2="-17" y2="-17" stroke-width="3.2" opacity=".85"/>
  </g>
</svg>
