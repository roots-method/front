<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A trigger event flows into an orchestrator agent, which fans out to three specialist decision agents (risk, exception, ledger). Their outputs converge on a confidence gate, which branches to either autonomous execution or human escalation based on the agent's self-rated confidence.</desc>
